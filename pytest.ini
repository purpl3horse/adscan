[pytest]
minversion = 7.0
addopts = -ra -m "not integration"
testpaths =
    tests
markers =
    unit: Unit tests that mock external integrations and run quickly.
    integration: Integration tests that require real external services.
    e2e: End-to-end tests that require full lab environments (GOAD/HTB/etc.).
    ce: BloodHound CE integration tests.

# ── Per-test timeout (pytest-timeout) ───────────────────────────────
# Convert hung tests into explicit failures instead of stalling CI.
#
# History: a CI hang on 2026-05-21 came from an infinite re-prompt loop
# inside ``offer_attack_paths_for_execution_summaries`` triggered by a
# test that mocked the questionary picker to always select the same
# path. The loop spun in pure Python with no I/O, never asserted, never
# raised — pytest had no signal to stop. The CI runner kept the job
# alive until its hour-long job timeout fired, reporting "cancelled"
# rather than "test failed". With the budget below, pytest kills the
# offending test after 60s and surfaces a stack trace pointing at the
# real culprit, turning multi-hour CI black-outs into 60-second
# diagnostics.
#
# Budget choice — 60s per test:
#   * Generous enough for legitimately slow unit tests (the slowest
#     ones in this repo are ~30s — graph regression suites).
#   * Tight enough that an accidental infinite loop fails fast.
#   * Individual tests can override with ``@pytest.mark.timeout(N)``
#     when they have a documented reason to need more.
#
# Method choice — ``thread`` over ``signal``:
#   * ``signal`` (default) only fires when the test is back at the
#     Python interpreter level. A C-extension or syscall that blocks
#     indefinitely sails past it. ``thread`` runs the test in a worker
#     thread and the timer in the main thread, so the deadline always
#     fires.
#   * Slight tradeoff: ``thread`` is less precise for test isolation
#     because the worker thread inherits process-wide state. For unit
#     tests that already mock external state this is fine; integration
#     tests that need their own process should use ``--forked`` (not
#     enabled by default).
timeout = 60
timeout_method = thread
