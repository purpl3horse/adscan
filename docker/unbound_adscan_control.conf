# ADscan Unbound remote-control configuration (build-time default).
#
# IMPORTANT: this file is OVERWRITTEN by the container entrypoint at runtime
# with a single `control-interface` matching the resolver IP that the host
# launcher reserved via flock. The default below is only used when ADscan is
# started without the entrypoint (manual `docker run` for debugging) and
# binds to the conservative `127.0.0.1` only — listing the full loopback
# pool here would make sibling containers under `--network host` fight for
# the same control sockets and silently route `unbound-control` reloads to
# the wrong daemon.
#
# Security note: limited to localhost inside the container.

remote-control:
  control-enable: yes
  control-interface: 127.0.0.1
  control-port: 8953
  control-use-cert: no
